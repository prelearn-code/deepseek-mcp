# Copy this table into ~/.codex/config.toml and replace the absolute path.
[mcp_servers.deepseek_worker]
command = "/absolute/path/to/deepseek-mcp/.venv/bin/python"
args = ["-m", "deepseek_worker.server"]
env_vars = ["DEEPSEEK_API_KEY", "DEEPSEEK_BASE_URL", "DEEPSEEK_STATE_DIR"]
startup_timeout_sec = 20
tool_timeout_sec = 1800
required = false
default_tools_approval_mode = "prompt"
